<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Просмотр объекта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .viewer-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            background: #f5f5f5;
            border-radius: 12px;
            overflow: hidden;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }

        .viewer-wrapper:active {
            cursor: grabbing;
        }

        .viewer-wrapper.loading {
            cursor: wait;
        }

        .viewer-wrapper:fullscreen {
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 0;
        }

        .viewer-wrapper:-webkit-full-screen {
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 0;
        }

        .viewer-wrapper:-moz-full-screen {
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 0;
        }

        .viewer-wrapper:-ms-fullscreen {
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 0;
        }

        #viewer {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.3s ease;
        }

        .viewer-wrapper:fullscreen #viewer,
        .viewer-wrapper:-webkit-full-screen #viewer,
        .viewer-wrapper:-moz-full-screen #viewer {
            max-width: 90vw;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.1);
        }

        .fullscreen-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .viewer-wrapper:fullscreen .fullscreen-btn,
        .viewer-wrapper:-webkit-full-screen .fullscreen-btn,
        .viewer-wrapper:-moz-full-screen .fullscreen-btn {
            top: 30px;
            right: 30px;
        }

        .loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .controls {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .control-row label {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .toggle-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .toggle-btn:active {
            transform: translateY(0);
        }

        .toggle-btn.active {
            background: #4caf50;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            max-width: 200px;
        }

        .speed-value {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            min-width: 30px;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }

        .frame-counter {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
        }

        .viewer-wrapper:fullscreen ~ .frame-counter,
        .viewer-wrapper:-webkit-full-screen ~ .frame-counter,
        .viewer-wrapper:-moz-full-screen ~ .frame-counter {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .control-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .speed-control {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>360° Просмотр объекта</h1>
        <p class="subtitle">Перетащите мышью или проведите пальцем для поворота</p>
        
        <div class="viewer-wrapper" id="viewerWrapper">
            <img id="viewer" alt="360 view">
            <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="Полноэкранный режим">
                <svg id="expandIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
                <svg id="collapseIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                    <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
                </svg>
            </button>
            <div class="loading-indicator" id="loadingIndicator">
                <div class="spinner"></div>
                <div>Загрузка изображений...</div>
                <div id="loadingProgress">0 / 27</div>
            </div>
        </div>

        <div class="frame-counter" id="frameCounter">Кадр: 18 / 27</div>
    </div>

    <script>
        // Конфигурация
        const TOTAL_FRAMES = 27;
        const IMAGE_FOLDER = 'images/';
        const IMAGE_PREFIX = 'mic-'; 
        const IMAGE_EXT = '.jpg';

        // Состояние
        let currentFrame = 17; 
        let images = [];
        let isLoaded = false;
        let isDragging = false;
        let startX = 0;
        let autoRotate = false;
        let rotationSpeed = 3;
        let rotationDirection = 1;
        let animationFrame = null;

        const viewer = document.getElementById('viewer');
        const viewerWrapper = document.getElementById('viewerWrapper');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const loadingProgress = document.getElementById('loadingProgress');
        const frameCounter = document.getElementById('frameCounter');
        const autoRotateBtn = document.getElementById('autoRotateBtn');
        const directionBtn = document.getElementById('directionBtn');
        const speedValue = document.getElementById('speedValue');

        // Предзагрузка изображений
        function preloadImages() {
            let loadedCount = 0;

            for (let i = 1; i <= TOTAL_FRAMES; i++) {
                const img = new Image();
                const filename = IMAGE_PREFIX + i + IMAGE_EXT;
                
                img.onload = () => {
                    loadedCount++;
                    loadingProgress.textContent = `${loadedCount} / ${TOTAL_FRAMES}`;
                    
                    if (loadedCount === TOTAL_FRAMES) {
                        isLoaded = true;
                        loadingIndicator.style.display = 'none';
                        viewerWrapper.classList.remove('loading');
                        showFrame(17);
                    }
                };
                
                img.onerror = () => {
                    console.error(`Не удалось загрузить: ${filename}`);
                    loadedCount++;
                    loadingProgress.textContent = `${loadedCount} / ${TOTAL_FRAMES}`;
                    
                    if (loadedCount === TOTAL_FRAMES) {
                        isLoaded = true;
                        loadingIndicator.style.display = 'none';
                        viewerWrapper.classList.remove('loading');
                        if (images.length > 0) {
                            showFrame(17);
                        } else {
                            loadingIndicator.innerHTML = '<div style="color: red;">Ошибка: Изображения не найдены. Поместите изображения в папку "images/"</div>';
                            loadingIndicator.style.display = 'block';
                        }
                    }
                };
                
                img.src = IMAGE_FOLDER + filename;
                images.push(img);
            }
        }

        // Показать кадр
        function showFrame(index) {
            if (!isLoaded || images.length === 0) return;
            
            // Проверяем границы и меняем направление
            if (index >= TOTAL_FRAMES - 1) {
                currentFrame = TOTAL_FRAMES - 1;
                rotationDirection = -1; 
            } else if (index <= 0) {
                currentFrame = 0;
                rotationDirection = 1;
            } else {
                currentFrame = index;
            }
            
            viewer.src = images[currentFrame].src;
            frameCounter.textContent = `Кадр: ${currentFrame + 1} / ${TOTAL_FRAMES}`;
        }

        // Обработка перетаскивания мышью
        viewerWrapper.addEventListener('mousedown', (e) => {
            if (!isLoaded) return;
            isDragging = true;
            startX = e.pageX;
            stopAutoRotate();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.pageX - startX;
            const sensitivity = 10;
            
            if (Math.abs(deltaX) > sensitivity) {
                const direction = deltaX > 0 ? 1 : -1;
                showFrame(currentFrame + direction);
                startX = e.pageX;
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Обработка сенсорных событий
        let touchStartX = 0;

        viewerWrapper.addEventListener('touchstart', (e) => {
            if (!isLoaded) return;
            touchStartX = e.touches[0].pageX;
            stopAutoRotate();
        });

        viewerWrapper.addEventListener('touchmove', (e) => {
            if (!isLoaded) return;
            e.preventDefault();
            
            const deltaX = e.touches[0].pageX - touchStartX;
            const sensitivity = 10;
            
            if (Math.abs(deltaX) > sensitivity) {
                const direction = deltaX > 0 ? 1 : -1;
                showFrame(currentFrame + direction);
                touchStartX = e.touches[0].pageX;
            }
        });

        // Обработка колесика мыши
        viewerWrapper.addEventListener('wheel', (e) => {
            if (!isLoaded) return;
            e.preventDefault();
            
            const direction = e.deltaY > 0 ? 1 : -1;
            showFrame(currentFrame + direction);
            stopAutoRotate();
        });

        // Автоповорот
        function toggleAutoRotate() {
            autoRotate = !autoRotate;
            
            if (autoRotate) {
                autoRotateBtn.textContent = 'Выключить';
                autoRotateBtn.classList.add('active');
                startAutoRotate();
            } else {
                autoRotateBtn.textContent = 'Включить';
                autoRotateBtn.classList.remove('active');
                stopAutoRotate();
            }
        }

        function startAutoRotate() {
            if (!isLoaded) return;
            
            let lastTime = Date.now();
            
            function rotate() {
                if (!autoRotate) return;
                
                const currentTime = Date.now();
                const deltaTime = currentTime - lastTime;
                
                // Скорость: чем выше значение, тем быстрее вращение
                const interval = 1000 / (rotationSpeed * 2); 
                
                if (deltaTime >= interval) {
                    showFrame(currentFrame + rotationDirection);
                    lastTime = currentTime;
                }
                
                animationFrame = requestAnimationFrame(rotate);
            }
            
            rotate();
        }

        function stopAutoRotate() {
            autoRotate = false;
            autoRotateBtn.textContent = 'Включить';
            autoRotateBtn.classList.remove('active');
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
        }

        // Изменение скорости
        function updateSpeed() {
            const slider = document.getElementById('speedSlider');
            rotationSpeed = parseInt(slider.value);
            speedValue.textContent = rotationSpeed;
            
            // Если автоповорот включен, перезапустить его с новой скоростью
            if (autoRotate) {
                stopAutoRotate();
                autoRotate = true; 
                autoRotateBtn.classList.add('active');
                autoRotateBtn.textContent = 'Выключить';
                startAutoRotate();
            }
        }

        // Изменение направления
        function toggleDirection() {
            rotationDirection *= -1;
            directionBtn.textContent = rotationDirection === 1 ? 'По часовой' : 'Против часовой';
        }

        // Клавиатурное управление
        document.addEventListener('keydown', (e) => {
            if (!isLoaded) return;
            
            if (e.key === 'ArrowLeft') {
                showFrame(currentFrame - 1);
                stopAutoRotate();
            } else if (e.key === 'ArrowRight') {
                showFrame(currentFrame + 1);
                stopAutoRotate();
            } else if (e.key === ' ') {
                e.preventDefault();
                toggleAutoRotate();
            }
        });

        // Полноэкранный режим
        function toggleFullscreen() {
            const wrapper = document.getElementById('viewerWrapper');
            const expandIcon = document.getElementById('expandIcon');
            const collapseIcon = document.getElementById('collapseIcon');
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement) {
                // Входим в полноэкранный режим
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                } else if (wrapper.mozRequestFullScreen) {
                    wrapper.mozRequestFullScreen();
                } else if (wrapper.msRequestFullscreen) {
                    wrapper.msRequestFullscreen();
                }
                expandIcon.style.display = 'none';
                collapseIcon.style.display = 'block';
            } else {
                // Выходим из полноэкранного режима
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                expandIcon.style.display = 'block';
                collapseIcon.style.display = 'none';
            }
        }

        // Отслеживание изменения полноэкранного режима (для ESC)
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('mozfullscreenchange', updateFullscreenButton);
        document.addEventListener('MSFullscreenChange', updateFullscreenButton);

        function updateFullscreenButton() {
            const expandIcon = document.getElementById('expandIcon');
            const collapseIcon = document.getElementById('collapseIcon');
            
            if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement) {
                expandIcon.style.display = 'none';
                collapseIcon.style.display = 'block';
            } else {
                expandIcon.style.display = 'block';
                collapseIcon.style.display = 'none';
            }
        }

        // Запуск
        preloadImages();
    </script>
</body>
</html>
